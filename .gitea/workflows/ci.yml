name: ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    name: Build for ${{ join(matrix.platforms, ', ') }}
    strategy:
      matrix:
        include:
          - runner: windows-10
            platforms:
              - windows
          - runner: macos-15
            platforms: 
              - macos
              - android
              - ios
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build
        run: |
          zx vcpkg_install_packages.mjs ${{ join(matrix.platforms, ' ') }} --clean
